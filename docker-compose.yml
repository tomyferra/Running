services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: garmin-api:local
    container_name: garmin-api
    ports:
      - "8000:8000"
    volumes:
      - ./data/garmin:/data/garmin
    env_file:
      - .env
    environment:
      - DB_DIR=/data/garmin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: garmin-frontend:local
    container_name: garmin-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

