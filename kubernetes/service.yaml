apiVersion: v1
kind: Service
metadata:
  name: garmin-api
  namespace: default
  labels:
    app: garmin-api
spec:
  type: NodePort
  selector:
    app: garmin-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30800  # access via: minikube ip → http://<minikube-ip>:30800
